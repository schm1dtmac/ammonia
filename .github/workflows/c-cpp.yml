name: C/C++ CI

on:
  push:
    branches: [ "logoutfix" ]
  pull_request:
    branches: [ "logoutfix" ]

jobs:
  build:

    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
    - name: make
      run: |
        ./setup_frida.sh
        ./compile.sh
        ./package.sh
                - name: Upload a Build Artifact
    - uses: actions/upload-artifact@v6.0.0
      with:
        path: ./
          
